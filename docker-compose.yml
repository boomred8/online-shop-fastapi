services:
  db:
    image: postgres:16
    container_name: shop_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shop_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: online_shop_app
    restart: always
    ports:
      - "8000:8000"
    environment:
      PG_DATABASE: postgresql+asyncpg://postgres:postgres@db:5432/shop_db
    depends_on:
      - db

volumes:
  postgres_data: